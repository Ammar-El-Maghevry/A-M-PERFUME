spring:
  application:
    name: am-perfume-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/amperfume}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false

  sql:
    init:
      mode: always
      continue-on-error: true
      data-locations: classpath:data.sql

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8080
  servlet:
    context-path: /
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always

app:
  base-url: ${BASE_URL:http://localhost:8080}
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
    allowed-origin-patterns: https://*.vercel.app
  jwt:
    secret: ${JWT_SECRET:amperfume_super_secret_key_2024_minimum_32_chars}
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 7
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    folder: amperfume

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.springframework.security: INFO
    com.amperfume: INFO
