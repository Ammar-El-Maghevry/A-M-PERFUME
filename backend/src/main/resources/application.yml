spring:
  application:
    name: am-perfume-api

  datasource:
    url: jdbc:h2:mem:amperfume;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    open-in-view: false

  sql:
    init:
      mode: always
      continue-on-error: true
      data-locations: classpath:data.sql

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

app:
  base-url: ${BASE_URL:http://localhost:8080}
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
    allowed-origin-patterns: https://*.vercel.app
  jwt:
    secret: ${JWT_SECRET:amperfume_super_secret_key_2024_minimum_32_chars}
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 7
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    folder: amperfume

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.amperfume: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  h2:
    console:
      enabled: false

  jpa:
    properties:
      hibernate:
        format_sql: false

  sql:
    init:
      mode: never

app:
  base-url: ${BASE_URL}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app}
  jwt:
    secret: ${JWT_SECRET}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}

logging:
  level:
    com.amperfume: INFO
